<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head"></head>
<body>
<header th:replace="fragments :: header"></header>
<h4>Olympics Details</h4>
<div class="col-6">
    <table class="table table-hover">
        <tr>
            <th>Id</th>
            <td th:text="${olympics.id}"></td>
        </tr>
        <tr>
            <th>Name</th>
            <td th:text="${olympics.name}"></td>
        </tr>
        <tr>
            <th>Host City</th>
            <td th:text="${olympics.hostCity}"></td>
        </tr>
        <tr>
            <th>Country</th>
            <td th:text="${olympics.country}"></td>
        </tr>
        <tr>
            <th>Start Date</th>
            <td th:text="${olympics.startDate}"></td>
        </tr>
        <tr>
            <th>End Date</th>
            <td th:text="${olympics.endDate}"></td>
        </tr>
    </table>
    <a class="btn btn-info" th:href="@{'/olympics/edit-olympics/'+${olympics.id}}">Edit</a>
    <a class="btn btn-secondary" href="/olympics">Back</a>
</div>
<footer th:replace="fragments :: footer"></footer>
</body>
</html>
