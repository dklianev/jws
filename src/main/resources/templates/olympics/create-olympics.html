<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<h4>Create Olympics</h4>
<div class="col-6">
    <form action="#" th:action="@{/olympics/create}" th:object="${olympics}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}" id="name">
            <label for="hostCity">Host City</label>
            <input class="form-control" type="text" th:field="*{hostCity}" id="hostCity">
            <label for="country">Country</label>
            <input class="form-control" type="text" th:field="*{country}" id="country">
            <label for="startDate">Start Date</label>
            <input class="form-control" type="date" th:field="*{startDate}" id="startDate">
            <label for="endDate">End Date</label>
            <input class="form-control" type="date" th:field="*{endDate}" id="endDate">
        </div>
        <button type="submit" class="btn btn-primary">Save Olympics</button>
    </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
