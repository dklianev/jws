<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head"></head>
<body>
<header th:replace="fragments :: header"></header>
<h4>Enter Biathlon Result</h4>
<div class="col-6">
    <form action="#" th:action="@{/results/biathlon/create}" th:object="${result}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="athleteId">Athlete</label>
            <select class="form-control" th:field="*{athleteId}" id="athleteId">
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.firstName + ' ' + athlete.lastName}"></option>
            </select>
            <label for="competitionId">Competition</label>
            <select class="form-control" th:field="*{competitionId}" id="competitionId">
                <option th:each="competition : ${competitions}" th:value="${competition.id}" th:text="${competition.name}"></option>
            </select>
            <label for="skiingTimeSeconds">Skiing Time Seconds</label>
            <input class="form-control" type="text" th:field="*{skiingTimeSeconds}" id="skiingTimeSeconds">
            <label for="missedShots">Missed Shots</label>
            <input class="form-control" type="number" th:field="*{missedShots}" id="missedShots">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{didNotFinish}" id="didNotFinish">
                <label class="form-check-label" for="didNotFinish">Did Not Finish</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save Result</button>
    </form>
</div>
<footer th:replace="fragments :: footer"></footer>
</body>
</html>
