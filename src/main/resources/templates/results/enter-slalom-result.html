<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head"></head>
<body>
<header th:replace="fragments :: header"></header>
<h4>Enter Slalom Result</h4>
<div class="col-6">
    <form action="#" th:action="@{/results/slalom/create}" th:object="${result}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="athleteId">Athlete</label>
            <select class="form-control" th:field="*{athleteId}" id="athleteId">
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.firstName + ' ' + athlete.lastName}"></option>
            </select>
            <label for="competitionId">Competition</label>
            <select class="form-control" th:field="*{competitionId}" id="competitionId">
                <option th:each="competition : ${competitions}" th:value="${competition.id}" th:text="${competition.name}"></option>
            </select>
            <label for="firstRunTime">First Run Time</label>
            <input class="form-control" type="text" th:field="*{firstRunTime}" id="firstRunTime">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{firstRunDnf}" id="firstRunDnf">
                <label class="form-check-label" for="firstRunDnf">First Run DNF</label>
            </div>
            <label for="secondRunTime">Second Run Time</label>
            <input class="form-control" type="text" th:field="*{secondRunTime}" id="secondRunTime">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{secondRunDnf}" id="secondRunDnf">
                <label class="form-check-label" for="secondRunDnf">Second Run DNF</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save Result</button>
    </form>
</div>
<footer th:replace="fragments :: footer"></footer>
</body>
</html>
