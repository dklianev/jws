<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<h4>Edit Biathlon Result</h4>
<div class="col-6">
    <form action="#" th:action="@{/results/biathlon/update/{id}(id=${result.id})}" th:object="${result}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="skiingTimeSeconds">Skiing Time Seconds</label>
            <input class="form-control" type="text" th:field="*{skiingTimeSeconds}" id="skiingTimeSeconds">
            <label for="missedShots">Missed Shots</label>
            <input class="form-control" type="number" th:field="*{missedShots}" id="missedShots">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{didNotFinish}" id="didNotFinish">
                <label class="form-check-label" for="didNotFinish">Did Not Finish</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Update Result</button>
    </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
