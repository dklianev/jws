<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <title>Winter Olympics 2026</title>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link href="/css/application.css?v=20260531" rel="stylesheet" th:href="@{/css/application.css(v=20260531)}"/>
</head>
<header th:fragment="header">
    <h1>Winter Olympics 2026</h1>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" th:fragment="navigation">
        <div class="navbar-collapse show" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item" th:if="${isAdmin}"><a class="nav-link" href="/athletes">Athletes</a></li>
                <li class="nav-item" th:if="${isAthlete}"><a class="nav-link" href="/athletes/self-register">My Profile</a></li>
                <li class="nav-item" th:if="${isAthlete}"><a class="nav-link" href="/registrations">Register</a></li>
                <li class="nav-item" th:if="${isAdmin}"><a class="nav-link" href="/olympics">Olympics</a></li>
                <li class="nav-item" th:if="${isAdmin}"><a class="nav-link" href="/slalom-competitions">Slalom</a></li>
                <li class="nav-item" th:if="${isAdmin}"><a class="nav-link" href="/biathlon-competitions">Biathlon</a></li>
                <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="form-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>
</header>
<footer th:fragment="footer" class="page-footer font-small">
    <div class="footer-copyright text-center py-3">© 2026 Copyright:
        <a href="#"> Winter Olympics 2026</a>
    </div>
</footer>
</html>
