<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head"></head>
<body>
<header th:replace="fragments :: header"></header>
<h4>Edit Athlete</h4>
<div class="col-6">
    <form action="#" th:action="@{/athletes/update/{id}(id=${athlete.id})}" th:object="${athlete}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input class="form-control" type="text" th:field="*{firstName}" id="firstName">
            <label for="lastName">Last Name</label>
            <input class="form-control" type="text" th:field="*{lastName}" id="lastName">
            <label for="country">Country</label>
            <input class="form-control" type="text" th:field="*{country}" id="country">
            <label for="gender">Gender</label>
            <select class="form-control" th:field="*{gender}" id="gender">
                <option th:each="gender : ${genders}" th:value="${gender}" th:text="${gender}"></option>
            </select>
            <label for="dateOfBirth">Date Of Birth</label>
            <input class="form-control" type="date" th:field="*{dateOfBirth}" th:value="*{dateOfBirth}" id="dateOfBirth">
        </div>
        <button type="submit" class="btn btn-primary">Update Athlete</button>
    </form>
</div>
<footer th:replace="fragments :: footer"></footer>
</body>
</html>
